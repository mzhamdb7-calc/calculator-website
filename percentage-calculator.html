<!DOCTYPE html>
<html>
<head>
  <title>Percentage Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free percentage calculator to calculate percentages quickly online.">
</head>
<script>
window.addEventListener("scroll", function(){
  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");

  if(window.scrollY > 80){
    navbar.classList.add("scrolled");
    menuIcon.classList.add("show");
  }else{
    navbar.classList.remove("scrolled");
    navbar.classList.remove("open");
    menuIcon.classList.remove("show");
  }
});

function toggleMenu(){
  document.getElementById("navbar").classList.toggle("open");
}
</script>
<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script>

window.addEventListener("scroll", function(){

  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");
  const scrollBtn = document.getElementById("scrollTopBtn");

  if(window.scrollY > 80){

    navbar.style.top = "120px";

    scrollBtn.style.display = "flex";

  }else{

    navbar.style.top = "25px";

    scrollBtn.style.display = "none";
  }

});

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

</script>
<body>

<nav id="navbar">

  <a href="index.html">Home</a>

  <div class="dropdown">
    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>
  </div>

  <a href="about.html">About</a>

</nav>

<button id="menuIcon" onclick="toggleMenu()">☰</button>

<div class="calculator">
  <h1>Percentage Calculator</h1>
  <p class="subtitle">Calculate percentage values quickly.</p>

  <input type="number" id="percent" placeholder="Percentage %">
  <br><br>

  <input type="number" id="number" placeholder="Of number">
  <br><br>

  <button onclick="calculatePercentage()">Calculate</button>

  <h2 id="result"></h2>
</div>

<script>
function calculatePercentage(){
  let percent = document.getElementById("percent").value;
  let number = document.getElementById("number").value;
  let result = (percent / 100) * number;

  document.getElementById("result").innerText =
  percent + "% of " + number + " is " + result;
}
</script>

</body>
</html>
