<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Percentage Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free percentage calculator to calculate percentages quickly online.">
</head>

<body>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">

      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">
        <a href="basic-calculator.html">basic</a>
        <a href="age-calculator.html">age</a>
        <a href="bmi-calculator.html">bmi</a>
        <a href="discount-calculator.html">discount</a>
        <a href="loan-calculator.html">loan</a>
        <a href="percentage-calculator.html">percentage</a>
      </div>

    </div>

    <a href="about.html">about</a>

  </nav>

  <button id="menuIcon" onclick="toggleMenu()">☰</button>

  <main class="single-calculator-container">

    <section class="calculator">

      <h1>Percentage Calculator</h1>

      <p class="subtitle">
        Calculate percentage values quickly.
      </p>

      <label for="percent">Percentage %:</label>
      <input type="number" id="percent" placeholder="Example: 20">

      <label for="number">Of number:</label>
      <input type="number" id="number" placeholder="Example: 150">

      <button type="button" onclick="calculatePercentage()" class="main-btn">
        calculate percentage
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

<script>
  function calculatePercentage() {
    const percent = Number(document.getElementById("percent").value);
    const number = Number(document.getElementById("number").value);
    const resultBox = document.getElementById("result");

    if (isNaN(percent) || isNaN(number)) {
      resultBox.innerText = "Please enter valid numbers.";
      return;
    }

    const result = (percent / 100) * number;

    resultBox.innerText =
      percent + "% of " + number + " is " + result.toFixed(2);
  }
</script>
</body>
</html>
