<body class="extra-calculator-page loanComparison-page" data-page="loanComparison">

  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">MENU</button>
  <nav id="navbar">

  <main class="loan-calculator-container extra-calculator-container">
    <section class="calculator extra-calculator-box">
      <h1>Loan Comparison Calculator</h1>
      <p class="subtitle">Compare Loan A and Loan B side by side.</p>
      
      <div class="extra-input-grid">
        <label for="loanCompareAmount">Loan amount</label>
<input type="number" id="loanCompareAmount" placeholder="Example: 50000" inputmode="decimal">
<label for="loanCompareRateA">Loan A rate (%)</label>
<input type="number" id="loanCompareRateA" placeholder="Example: 5" inputmode="decimal">
<label for="loanCompareTermA">Loan A term (years)</label>
<input type="number" id="loanCompareTermA" placeholder="Example: 5" inputmode="decimal">
<label for="loanCompareRateB">Loan B rate (%)</label>
<input type="number" id="loanCompareRateB" placeholder="Example: 6" inputmode="decimal">
<label for="loanCompareTermB">Loan B term (years)</label>
<input type="number" id="loanCompareTermB" placeholder="Example: 7" inputmode="decimal">
      </div>
      <button type="button" onclick="calculateLoanComparisonExtra()" class="main-btn">compare loans</button>
      <section id="extraCalcResult" class="extra-result-box" hidden></section>
    </section>
