<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body class="extra-calculator-page fuelCost-page" data-page="fuelCost">

  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">↑</button>
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">MENU</button>
  <nav id="navbar">
    <a href="index.html">home</a>
    <a href="basic-calculator.html">calculator</a>
    <a href="about.html">info</a>
  </nav>

  <main class="loan-calculator-container extra-calculator-container">
    <section class="calculator extra-calculator-box">
      <h1>Fuel Cost Calculator</h1>
      <p class="subtitle">Calculate trip fuel cost from distance, efficiency and fuel price.</p>
      
      <div class="extra-input-grid">
        <label for="fuelDistance">Distance (km)</label>
<input type="number" id="fuelDistance" placeholder="Example: 250" inputmode="decimal">
<label for="fuelEfficiency">Fuel efficiency (L/100km)</label>
<input type="number" id="fuelEfficiency" placeholder="Example: 7" inputmode="decimal">
<label for="fuelPrice">Fuel price per liter</label>
<input type="number" id="fuelPrice" placeholder="Example: 2.05" inputmode="decimal">
<label for="fuelPeople">People sharing cost</label>
<input type="number" id="fuelPeople" placeholder="Optional" inputmode="decimal">
      </div>
      <button type="button" onclick="calculateFuelCostExtra()" class="main-btn">calculate fuel cost</button>
      <section id="extraCalcResult" class="extra-result-box" hidden></section>
    </section>
  </main>
  <script src="script.js?v=extra_calculators_20260528"></script>
  <script src="pc.js?v=extra_calculators_20260528"></script>
