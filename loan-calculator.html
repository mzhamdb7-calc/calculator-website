<body class="loan-page" data-page="loan">

  <!-- MENU Button shown after scroll -->
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">
    MENU
  </button>

  <!-- Navbar -->
  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">
      <button type="button" class="dropbtn" aria-expanded="false">
        calculator
      </button>

      <div class="dropdown-content">

        <a href="basic-calculator.html">basic</a>

        <details class="nav-group">
          <summary>health</summary>

          <div class="nav-group-links">
            <a href="age-calculator.html">age</a>
            <a href="bmi-calculator.html">bmi</a>
          </div>
        </details>

        <details class="nav-group">
          <summary>finance</summary>

          <div class="nav-group-links">
            <a href="loan-calculator.html">mortgage / personal loan</a>
            <a href="discount-calculator.html">discount</a>
            <a href="compound-interest-calculator.html">compound interest</a>
          </div>
        </details>

        <a href="percentage-calculator.html">percentage</a>

      </div>
    </div>

    <div class="dropdown about-dropdown">
      <button type="button" class="dropbtn" aria-expanded="false">
        info
      </button>

      <div class="dropdown-content about-dropdown-content">
        <a href="about.html">about</a>
        <a href="privacy-policy.html">privacy policy</a>
        <a href="contact.html">contact</a>
      </div>
    </div>

  </nav>

  <!-- Main Content -->
  <main class="loan-calculator-container">

    <section class="loan-history-box">

      <div class="loan-history-top">
        <h3>History</h3>

        <button type="button" onclick="clearLoanHistory()" class="clear-btn">
          Clear
        </button>
      </div>

      <ul id="loanHistoryList"></ul>

    </section>

    <section class="calculator">

      <h1>Mortgage / Personal Loan Calculator</h1>

      <p class="subtitle">
        Estimate your monthly payment, full loan interest, and full payment value.
      </p>

      <label for="amount">Loan amount / purchase price:</label>
      <input
        type="number"
        id="amount"
        placeholder="Example: 10000"
        inputmode="decimal"
      >

      <label for="interest">Annual interest rate (%):</label>
      <input
        type="number"
        id="interest"
        placeholder="Example: 5"
        inputmode="decimal"
      >

      <label for="years">Loan term in months:</label>
      <input
        type="number"
        id="years"
        placeholder="Example: 360"
        inputmode="decimal"
        aria-label="Loan term in months"
        data-term-unit="months"
      >

      <button type="button" onclick="calculateLoan()" class="main-btn">
        calculate loan
      </button>

      <h2 id="loanResult"></h2>

    </section>

  </main>

  <script src="script.js?v=20260526_1905_index_abacus"></script>
