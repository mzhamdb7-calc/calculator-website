<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free loan calculator to estimate monthly loan payments online.">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="basic-calculator.html">Basic Calculator</a>
  <a href="bmi-calculator.html">BMI Calculator</a>
  <a href="age-calculator.html">Age Calculator</a>
</nav>

<div class="calculator">
  <h1>Loan Calculator</h1>
  <p class="subtitle">Estimate your monthly loan payment.</p>

  <input type="number" id="amount" placeholder="Loan amount">
  <br><br>

  <input type="number" id="interest" placeholder="Annual interest rate %">
  <br><br>

  <input type="number" id="years" placeholder="Loan years">
  <br><br>

  <button onclick="calculateLoan()">Calculate</button>

  <h2 id="result"></h2>
</div>

<script>
function calculateLoan(){
  let amount = document.getElementById("amount").value;
  let interest = document.getElementById("interest").value / 100 / 12;
  let months = document.getElementById("years").value * 12;

  let payment = amount * interest * Math.pow(1 + interest, months) /
  (Math.pow(1 + interest, months) - 1);

  document.getElementById("result").innerText =
  "Monthly payment: " + payment.toFixed(2);
}
</script>

</body>
</html>
