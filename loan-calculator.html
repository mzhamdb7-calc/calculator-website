<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free loan calculator to estimate monthly loan payments online.">
</head>

<body>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">

      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">
        <a href="basic-calculator.html">basic</a>
        <a href="age-calculator.html">age</a>
        <a href="bmi-calculator.html">bmi</a>
        <a href="discount-calculator.html">discount</a>
        <a href="loan-calculator.html">loan</a>
        <a href="percentage-calculator.html">percentage</a>
      </div>

    </div>

    <a href="about.html">about</a>

  </nav>

  <button id="menuIcon" onclick="toggleMenu()">☰</button>

  <main class="single-calculator-container">

    <section class="calculator">

      <h1>Loan Calculator</h1>

      <p class="subtitle">
        Estimate your monthly loan payment.
      </p>

      <label for="amount">Loan amount:</label>
      <input type="number" id="amount" placeholder="Example: 10000">

      <label for="interest">Annual interest rate %:</label>
      <input type="number" id="interest" placeholder="Example: 5">

      <label for="years">Loan years:</label>
      <input type="number" id="years" placeholder="Example: 3">

      <button type="button" onclick="calculateLoan()" class="main-btn">
        calculate loan
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

<script>
    
    function calculateLoan() {
      const amount = Number(document.getElementById("amount").value);
      const annualInterest = Number(document.getElementById("interest").value);
      const years = Number(document.getElementById("years").value);
      const result = document.getElementById("result");

      if (amount <= 0) {
        result.innerText = "Please enter a valid loan amount.";
        return;
      }

      if (annualInterest < 0) {
        result.innerText = "Please enter a valid interest rate.";
        return;
      }

      if (years <= 0) {
        result.innerText = "Please enter valid loan years.";
        return;
      }

      const months = years * 12;
      const monthlyInterest = annualInterest / 100 / 12;

      let payment;

      if (monthlyInterest === 0) {
        payment = amount / months;
      } else {
        payment =
          amount * monthlyInterest * Math.pow(1 + monthlyInterest, months) /
          (Math.pow(1 + monthlyInterest, months) - 1);
      }

      result.innerText = "Monthly payment: " + payment.toFixed(2);
    }
  </script>

</body>
</html>
