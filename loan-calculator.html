<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free loan calculator to estimate monthly loan payments online.">
</head>
<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>
<script>

window.addEventListener("scroll", function(){

  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");
  const scrollBtn = document.getElementById("scrollTopBtn");

  if(window.scrollY > 80){

    navbar.classList.add("scrolled");
    menuIcon.classList.add("show");

    navbar.style.top = "120px";

  }else{

    navbar.classList.remove("scrolled");
    navbar.classList.remove("open");
    menuIcon.classList.remove("show");

    navbar.style.top = "25px";
  }

  if(window.scrollY > 200){

    scrollBtn.style.display = "flex";

  }else{

    scrollBtn.style.display = "none";
  }

});

function toggleMenu(){

  document.getElementById("navbar").classList.toggle("open");

}

function scrollToTop(){

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

</script>
<body>

<nav id="navbar">

  <a href="index.html">Home</a>

  <div class="dropdown">
    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>
  </div>

  <a href="about.html">About</a>

</nav>

<button id="menuIcon" onclick="toggleMenu()">☰</button>
<div class="calculator">
  <h1>Loan Calculator</h1>
  <p class="subtitle">Estimate your monthly loan payment.</p>

  <div class="loan-form">

  <div class="loan-inputs">

    <input type="number" id="amount" placeholder="Loan amount">

    <input type="number" id="interest" placeholder="Annual interest rate %">

    <input type="number" id="years" placeholder="Loan years">

  </div>

  <button onclick="calculateLoan()">Calculate</button>

</div>

  <h2 id="result"></h2>
</div>

<script>
function calculateLoan(){
  let amount = document.getElementById("amount").value;
  let interest = document.getElementById("interest").value / 100 / 12;
  let months = document.getElementById("years").value * 12;

  let payment = amount * interest * Math.pow(1 + interest, months) /
  (Math.pow(1 + interest, months) - 1);

  document.getElementById("result").innerText =
  "Monthly payment: " + payment.toFixed(2);
}
</script>

</body>
</html>
