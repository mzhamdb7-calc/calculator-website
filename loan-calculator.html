    <section class="calculator">

      </p>

      <label for="amount">Loan amount:</label>
      <input type="number" id="amount" placeholder="Example: 10000">

      <input type="number" id="interest" placeholder="Example: 5">

      <label for="years">Loan years:</label>
      <input type="number" id="years" placeholder="Example: 2">

      <button type="button" onclick="calculateLoan()" class="main-btn">
        calculate loan
      </button>

      <h2 id="loanResult"></h2>

    </section>

  <script src="script.js"></script>

  <script>
    let loanHistory = [];

    try {
      loanHistory = JSON.parse(localStorage.getItem("loanHistory")) || [];
    } catch {
      loanHistory = [];
    }

    function calculateLoan() {
      const amount = Number(document.getElementById("amount").value);
      const annualRate = Number(document.getElementById("interest").value);
      const years = Number(document.getElementById("years").value);
      const result = document.getElementById("loanResult");

      if (amount <= 0 || annualRate < 0 || years <= 0) {
        result.innerText = "Please enter valid loan details.";
        return;
      }

      const months = years * 12;
      const monthlyRate = annualRate / 100 / 12;

      let monthlyPayment;

      if (monthlyRate === 0) {
        monthlyPayment = amount / months;
      } else {
        monthlyPayment =
          amount *
          monthlyRate *
          Math.pow(1 + monthlyRate, months) /
          (Math.pow(1 + monthlyRate, months) - 1);
      }

      const totalPayment = monthlyPayment * months;
      const totalInterest = totalPayment - amount;

      const answer =
        "Monthly payment: " + monthlyPayment.toFixed(2) + "\n" +
        "Yearly interest: " + annualRate.toFixed(2) + "%\n" +
        "Total interest: " + totalInterest.toFixed(2) + "\n" +
        "Total payment: " + totalPayment.toFixed(2);

      result.innerText = answer;

      saveLoanHistory(amount, annualRate, years, answer);
    }

    function saveLoanHistory(amount, annualRate, years, answer) {
      const item =
        "Loan: " + amount.toFixed(2) +
        " | Interest: " + annualRate.toFixed(2) + "%" +
        " | Years: " + years +
        " → " + answer.replace(/\n/g, " | ");

      loanHistory.push(item);

      if (loanHistory.length > 50) {
        loanHistory.shift();
      }

      localStorage.setItem("loanHistory", JSON.stringify(loanHistory));

      showLoanHistory();
    }

    function showLoanHistory() {
      const list = document.getElementById("loanHistoryList");

      if (!list) return;

      list.innerHTML = "";

      loanHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.className = "history-item";

        const text = document.createElement("span");
        text.className = "history-text";
        text.textContent = item;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "history-copy-btn";
        copyBtn.textContent = "copy";

        copyBtn.onclick = function () {
          copyLoanText(item, copyBtn);
        };

        li.appendChild(text);
        li.appendChild(copyBtn);

        list.appendChild(li);
      });
    }

    function copyLoanText(text, button) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(function () {
            showLoanCopied(button);
          })
          .catch(function () {
            fallbackLoanCopy(text, button);
          });
      } else {
        fallbackLoanCopy(text, button);
      }
    }

    function fallbackLoanCopy(text, button) {
      const tempInput = document.createElement("textarea");

      tempInput.value = text;
      tempInput.style.position = "fixed";
      tempInput.style.left = "-9999px";
      tempInput.style.top = "-9999px";

      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand("copy");
        showLoanCopied(button);
      } catch {
        button.textContent = "failed";

        setTimeout(function () {
          button.textContent = "copy";
        }, 1000);
      }

      document.body.removeChild(tempInput);
    }

    function showLoanCopied(button) {
      button.textContent = "copied";

      setTimeout(function () {
        button.textContent = "copy";
      }, 1000);
    }

    function clearLoanHistory() {
      loanHistory = [];
      localStorage.removeItem("loanHistory");

      showLoanHistory();

      const result = document.getElementById("loanResult");
      if (result) result.innerText = "";
    }

    document.addEventListener("DOMContentLoaded", showLoanHistory);
  </script>

<script>
/* OVERRIDE: fix phone navbar health/finance second-click close */
(function () {
  function convertNavbarDetails() {
    const navbar = document.getElementById("navbar");
    if (!navbar) return;

    navbar
      .querySelectorAll(".dropdown-content > details.nav-group")
      .forEach(function (details) {
        const summary = details.querySelector("summary");
        const links = details.querySelector(".nav-group-links");

        if (!summary || !links) return;

        const group = document.createElement("div");
        group.className = "nav-group navbar-fixed-group";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "navbar-fixed-summary";
        button.textContent = summary.textContent
          .replace(/[▼▲◀▶⬅🔽🔼]/g, "")
          .trim();

        group.appendChild(button);
        group.appendChild(links.cloneNode(true));

        details.replaceWith(group);
      });
  }

  function closeAllNavbarFixedGroups(exceptGroup) {
    document
      .querySelectorAll("#navbar .navbar-fixed-group")
      .forEach(function (group) {
        if (group !== exceptGroup) {
          group.classList.remove("is-open");
        }
      });
  }

  function setupNavbarFixedClick() {
    document.addEventListener(
      "click",
      function (event) {
        const button = event.target.closest(
          "#navbar .navbar-fixed-group > .navbar-fixed-summary"
        );

        if (!button) return;

        event.preventDefault();
        event.stopPropagation();

        const group = button.closest(".navbar-fixed-group");
        const wasOpen = group.classList.contains("is-open");

        closeAllNavbarFixedGroups(group);

        if (wasOpen) {
          group.classList.remove("is-open");
        } else {
          group.classList.add("is-open");
        }
      },
      true
    );

    document.addEventListener("click", function (event) {
      const navbar = document.getElementById("navbar");
      if (!navbar) return;

      if (!navbar.contains(event.target)) {
        closeAllNavbarFixedGroups(null);
      }
    });
  }

  convertNavbarDetails();
  setupNavbarFixedClick();
})();
</script>
