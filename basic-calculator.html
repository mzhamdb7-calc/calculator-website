<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Basic Calculator</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free basic calculator for quick math calculations.">

  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pc.css" media="screen and (min-width: 851px)">
  <link rel="stylesheet" href="phone.css" media="screen and (max-width: 850px)">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body class="basic-page" data-page="basic">

  <!-- Go Up Button -->
  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">
    ↑
  </button>

  <!-- MENU Button shown after scroll on PC -->
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">
    MENU
  </button>

  <!-- Navbar -->
  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">
      <button type="button" class="dropbtn" aria-expanded="false">
        calculator
      </button>

      <div class="dropdown-content">

        <a href="basic-calculator.html">basic</a>

        <details class="nav-group">
          <summary>health</summary>

          <div class="nav-group-links">
            <a href="age-calculator.html">age</a>
            <a href="bmi-calculator.html">bmi</a>
          </div>
        </details>

        <details class="nav-group">
          <summary>finance</summary>

          <div class="nav-group-links">
            <a href="mortgage-calculator.html">mortgage</a>
            <a href="personal-loan-calculator.html">personal loan</a>
            <a href="discount-calculator.html">discount</a>
            <a href="compound-interest-calculator.html">compound interest</a>
          </div>
        </details>

        <a href="percentage-calculator.html">percentage</a>

      </div>
    </div>

    <div class="dropdown about-dropdown">
      <button type="button" class="dropbtn" aria-expanded="false">
        info
      </button>

      <div class="dropdown-content about-dropdown-content">
        <a href="about.html">about</a>
        <a href="privacy-policy.html">privacy policy</a>
        <a href="contact.html">contact</a>
      </div>
    </div>

  </nav>

  <!-- Main Content -->
  <main class="calculator-container">

    <!-- History Box -->
    <section class="history">

      <div class="history-top">
        <h3>History</h3>

        <button type="button" class="clear-btn" onclick="clearHistory()">
          Clear
        </button>
      </div>

      <ul id="historyList"></ul>

    </section>

    <!-- Calculator Box -->
    <section class="calculator">

      <h1>Basic Calculator</h1>

      <p class="subtitle">
        Free online calculator for quick math calculations.
      </p>

      <div class="display-row">
        <input type="text" id="display" aria-label="Calculator display" inputmode="decimal" autocomplete="off" spellcheck="false">

        <button type="button" class="ans-btn" onclick="add('Ans')">
          ANS
        </button>
      </div>

      <div class="buttons basic-grid">

        <button type="button" onclick="add('+')">+</button>
        <button type="button" onclick="add('-')">−</button>
        <button type="button" onclick="add('*')">×</button>
        <button type="button" onclick="add('/')">÷</button>

        <button type="button" onclick="add('7')">7</button>
        <button type="button" onclick="add('8')">8</button>
        <button type="button" onclick="add('9')">9</button>
        <button type="button" onclick="addPower()">xʸ</button>

        <button type="button" onclick="add('4')">4</button>
        <button type="button" onclick="add('5')">5</button>
        <button type="button" onclick="add('6')">6</button>
        <button type="button" onclick="addFunction('sqrt')">√</button>

        <button type="button" onclick="add('1')">1</button>
        <button type="button" onclick="add('2')">2</button>
        <button type="button" onclick="add('3')">3</button>
        <button type="button" onclick="removeLast()">←</button>

        <button type="button" onclick="add('0')" class="zero-btn">0</button>
        <button type="button" onclick="add('.')">.</button>
        <button type="button" onclick="clearDisplay()" class="ac-btn">AC</button>
        <button type="button" onclick="calculate()" class="equal">=</button>

      </div>

    </section>

  </main>

  <script src="script.js"></script>
  <script src="pc.js"></script>
  <script src="phone.js"></script>

</body>
</html>
