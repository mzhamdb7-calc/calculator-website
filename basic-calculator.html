<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online calculators for BMI, age, percentages, loans and more.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
<nav>

  <a href="index.html">Home</a>

  <div class="dropdown">

    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>

  </div>

  <a href="about.html">About</a>

</nav>

<div class="calculator-container">

<div class="history">
  <h3>History</h3>
  <ul id="historyList"></ul>

  <button onclick="clearHistory()">Clear All</button>
</div>

<div class="calculator">
  <h1>Calculator</h1>
<p class="subtitle">
Free online calculator for quick math calculations.
</p>
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="add('/')">÷</button>
    <button onclick="add('*')">×</button>
    <button onclick="removeLast()">⌫</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('-')">−</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('+')">+</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="calculate()" class="equal">=</button>

    <button onclick="add('0')" class="zero">0</button>
    <button onclick="add('.')">.</button>
  </div>
</div>
<div>
<script src="script.js"></script>

</body>
</html>
