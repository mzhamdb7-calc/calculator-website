<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Estimate gross salary, deductions and net pay.">

  <link rel="stylesheet" href="style.css?v=extra_calculators_20260528">

<body class="extra-calculator-page salary-page" data-page="salary">

  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">↑</button>
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">MENU</button>
  <nav id="navbar">
    <a href="index.html">home</a>
    <a href="basic-calculator.html">calculator</a>
    <a href="about.html">info</a>
  </nav>

  <main class="loan-calculator-container extra-calculator-container">
    <section class="calculator extra-calculator-box">
      <h1>Salary Calculator</h1>
      <p class="subtitle">Estimate monthly and yearly take-home salary.</p>
      
      <div class="extra-input-grid">
        <label for="salaryGross">Gross monthly salary</label>
<input type="number" id="salaryGross" placeholder="Example: 5000" inputmode="decimal">
<label for="salaryEpfRate">EPF rate (%)</label>
<input type="number" id="salaryEpfRate" placeholder="Default: 11" inputmode="decimal">
<label for="salarySocso">SOCSO / EIS monthly</label>
<input type="number" id="salarySocso" placeholder="Optional" inputmode="decimal">
<label for="salaryTax">Monthly tax / PCB</label>
<input type="number" id="salaryTax" placeholder="Optional" inputmode="decimal">
<label for="salaryOther">Other deduction</label>
<input type="number" id="salaryOther" placeholder="Optional" inputmode="decimal">
      </div>
      <button type="button" onclick="calculateSalaryExtra()" class="main-btn">calculate salary</button>
      <section id="extraCalcResult" class="extra-result-box" hidden></section>
    </section>
  </main>
  <script src="script.js?v=extra_calculators_20260528"></script>
  <script src="pc.js?v=extra_calculators_20260528"></script>
