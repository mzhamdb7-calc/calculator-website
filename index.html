<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cartoon Calculator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Comic Sans MS", cursive;
}

body{
  background:#dfe7ef;
  overflow-x:hidden;
}

/* PAGE */

.page{
  max-width:1200px;
  min-height:100vh;
  margin:auto;
  background:#f8f8f8;
  border:5px solid black;
  position:relative;
}

/* TOP ADS */

.top-ad{
  height:90px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  font-weight:bold;
  border-bottom:5px solid black;
  background:#ffffff;

  box-shadow:
  5px 5px 0px black;
}

/* MAIN LAYOUT */

.layout{
  display:grid;
  grid-template-columns:220px 1fr 90px;
}

/* LEFT ADS */

.left-ad{
  border-right:5px solid black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  font-weight:bold;
  min-height:900px;
  background:#fff;
}

/* CONTENT */

.content{
  padding:40px;
  position:relative;
}

/* NAVBAR */

nav{
  width:600px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border:5px solid black;
  background:white;

  transform:rotate(-1deg);

  box-shadow:
  6px 6px 0px black;
}

nav a{
  text-decoration:none;
  color:black;
  font-size:30px;
  text-align:center;
  padding:10px;
  border-right:5px solid black;
}

nav a:last-child{
  border-right:none;
}

nav a:hover{
  background:#ffe56c;
}

/* CALCULATOR BOX */

.calculator-box{
  width:620px;
  margin:40px auto;
  border:5px solid black;
  padding:30px;
  background:white;

  transform:rotate(0.5deg);

  box-shadow:
  8px 8px 0px black;
}

.calculator-box h1{
  text-align:center;
  font-size:45px;
  margin-bottom:25px;
}

/* GRID */

.calculator-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:35px;
}

/* CARDS */

.card{
  height:110px;
  border:5px solid black;
  text-decoration:none;
  color:black;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:35px;
  font-weight:bold;

  background:#ffffff;

  transition:0.2s;

  box-shadow:
  5px 5px 0px black;
}

.card:nth-child(1){
  background:#ffd3d3;
}

.card:nth-child(2){
  background:#d3ffd9;
}

.card:nth-child(3){
  background:#d3e5ff;
}

.card:nth-child(4){
  background:#fff1b8;
}

.card:nth-child(5){
  background:#f1d3ff;
}

.card:nth-child(6){
  background:#d3fff9;
}

.card:hover{
  transform:
  translate(-3px,-3px)
  rotate(-1deg);

  box-shadow:
  9px 9px 0px black;
}

/* RIGHT MENU */

.right-menu{
  padding-top:50px;
  display:flex;
  justify-content:center;
}

.hamburger{
  width:45px;
}

.hamburger span{
  display:block;
  height:6px;
  background:black;
  margin:8px 0;
  border-radius:20px;
}

/* FLOATING BUTTON */

.scroll-top{
  position:fixed;
  right:35px;
  bottom:35px;

  width:70px;
  height:70px;

  border:5px solid black;
  background:white;

  font-size:40px;
  font-weight:bold;

  cursor:pointer;

  box-shadow:
  5px 5px 0px black;
}

.scroll-top:hover{
  transform:rotate(-10deg);
}

/* RESPONSIVE */

@media(max-width:768px){

  .layout{
    grid-template-columns:1fr;
  }

  .left-ad,
  .right-menu{
    display:none;
  }

  .content{
    padding:20px;
  }

  nav{
    width:100%;
  }

  nav a{
    font-size:20px;
  }

  .calculator-box{
    width:100%;
  }

  .calculator-grid{
    grid-template-columns:1fr;
  }

  .card{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="page">

  <div class="top-ad">
    
  </div>

  <div class="layout">

    <div class="left-ad">
      
    </div>

    <div class="content">

      <nav>
        <a href="#">home</a>
        <a href="#">calculator</a>
        <a href="#">about</a>
      </nav>

      <div class="calculator-box">

        <h1>Calculator</h1>

        <div class="calculator-grid">

          <a href="#" class="card">
            basic
          </a>

          <a href="#" class="card">
            finance
          </a>

          <a href="#" class="card">
            health
          </a>

          <a href="#" class="card">
            math
          </a>

          <a href="#" class="card">
            unit
          </a>

          <a href="#" class="card">
            date
          </a>

        </div>

      </div>

    </div>

    <div class="right-menu">

      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

  </div>

</div>

<button
class="scroll-top"
onclick="window.scrollTo({top:0,behavior:'smooth'})">
↑
</button>

</body>
</html>
