<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cartoon Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Comic Sans MS", cursive;
}

body{
  background:#dfe7ef;
  overflow-x:hidden;
}

.page{
  max-width:1200px;
  min-height:100vh;
  margin:auto;
  background:#f8f8f8;
  border:5px solid black;
}

.top-ad{
  height:90px;
  border-bottom:5px solid black;
  background:#fff;
  box-shadow:5px 5px 0 black;
}

.layout{
  display:grid;
  grid-template-columns:220px 1fr 90px;
}

.left-ad{
  border-right:5px solid black;
  min-height:900px;
  background:#fff;
}

.content{
  padding:40px;
}

/* NAVBAR */

#navbar{
  width:720px;
  height:90px;
  margin:auto;
  display:flex;
  position:relative;
  z-index:999999;
  background:white;
  border:5px solid black;
  box-shadow:7px 7px 0 black;
  transform:rotate(-1deg);
}

#navbar a,
.dropbtn{
  width:240px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:black;
  font-size:30px;
  font-weight:bold;
  border:none;
  border-right:5px solid black;
  background:white;
  cursor:pointer;
}

#navbar a:last-child{
  border-right:none;
}

#navbar a:hover,
.dropbtn:hover{
  background:#ffe56c;
}

.dropdown{
  width:240px;
  position:relative;
}

.dropdown-content{
  display:none;
  position:fixed;
  top:185px;
  left:50%;
  transform:translateX(-50%);
  width:240px;
  background:white;
  border:5px solid black;
  box-shadow:6px 6px 0 black;
  z-index:9999999;
}

.dropdown-content a{
  width:100%;
  height:55px;
  font-size:20px;
  border-right:none;
  border-bottom:4px solid black;
}

.dropdown:hover .dropdown-content{
  display:block;
}

/* SCROLL MENU */

#navbar.scrolled{
  display:none;
}

#navbar.open{
  display:flex;
  position:fixed;
  top:120px;
  right:35px;
  left:auto;
  width:260px;
  height:auto;
  flex-direction:column;
  transform:none;
  z-index:999999;
}

#navbar.open a,
#navbar.open .dropbtn{
  width:260px;
  height:70px;
  border-right:none;
  border-bottom:5px solid black;
}

#navbar.open .dropdown{
  width:260px;
}

#navbar.open .dropdown-content{
  position:static;
  transform:none;
  width:260px;
  box-shadow:none;
  border-left:none;
  border-right:none;
}

/* HAMBURGER */

.hamburger{
  position:fixed;
  top:50px;
  right:35px;
  width:55px;
  cursor:pointer;
  display:none;
  z-index:999999;
}

.hamburger.show{
  display:block;
}

.hamburger span{
  display:block;
  height:6px;
  background:black;
  margin:8px 0;
  border-radius:20px;
}

/* CALCULATOR BOX */

.calculator-box{
  width:620px;
  margin:40px auto;
  border:5px solid black;
  padding:30px;
  background:white;
  box-shadow:8px 8px 0 black;
  position:relative;
  z-index:1;
}

.calculator-box h1{
  text-align:center;
  font-size:45
