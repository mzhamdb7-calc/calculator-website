<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">

  <script>

      window.location.replace(
        window.location.pathname + "index.html" + window.location.search + window.location.hash

    }
  </script>
</head>

<body>

  <!-- Go Up Button -->
  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">
    ↑
  </button>

  <!-- MENU Button shown after scroll -->
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">
    MENU
  </button>

  <!-- Navbar -->
  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">
      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">

        <a href="basic-calculator.html">basic</a>

        <details class="nav-group">
          <summary>health</summary>

          <div class="nav-group-links">
            <a href="age-calculator.html">age</a>
            <a href="bmi-calculator.html">bmi</a>
          </div>
        </details>

        <details class="nav-group">
          <summary>finance</summary>

          <div class="group-links">
  <a href="loan-calculator.html">loan</a>
  <a href="discount-calculator.html">discount</a>
  <a href="compound-interest-calculator.html">compound interest</a>
</div>
        </details>

        <a href="percentage-calculator.html">percentage</a>

      </div>
    </div>

    <a href="about.html">about</a>

  </nav>

  <!-- Main Content -->
  <main class="calculator-box">

    <h1>Calculator</h1>

    <div class="calculator-grid">

      <a href="basic-calculator.html" class="card">
        basic
      </a>

      <details class="group-card health-card">
        <summary>health</summary>

        <div class="group-links">
          <a href="age-calculator.html">age</a>
          <a href="bmi-calculator.html">bmi</a>
        </div>
      </details>

      <details class="group-card finance-card">
        <summary>finance</summary>

        <div class="group-links">
          <a href="loan-calculator.html">loan</a>
          <a href="discount-calculator.html">discount</a>
        </div>
      </details>

      <a href="percentage-calculator.html" class="card">
        percentage
      </a>

    </div>

  </main>

  <script src="script.js"></script>

  <style>
    /* HTML OVERRIDE STYLE: fixed navbar health/finance menu */
    #navbar .navbar-fixed-group {
      position: relative !important;
      overflow: visible !important;
    }

    #navbar .navbar-fixed-summary {
      width: 100% !important;
      height: 50px !important;

      display: flex !important;
      align-items: center !important;
      justify-content: center !important;

      background: var(--white) !important;
      color: var(--black) !important;

      border: none !important;
      border-bottom: 3px solid var(--black) !important;

      font-family: inherit !important;
      font-size: 20px !important;
      font-weight: bold !important;

      cursor: pointer !important;
    }

    #navbar .navbar-fixed-summary::after {
      content: " ▼" !important;
      margin-left: 8px !important;
    }

    #navbar .navbar-fixed-group.is-open > .navbar-fixed-summary {
      background: var(--yellow) !important;
    }

    #navbar .navbar-fixed-group.is-open > .navbar-fixed-summary::after {
      content: " ◀" !important;
    }

    #navbar .navbar-fixed-group > .nav-group-links,
    #navbar .navbar-fixed-group:hover > .nav-group-links,
    #navbar .navbar-fixed-group:focus-within > .nav-group-links {
      display: none !important;
    }

    #navbar .navbar-fixed-group.is-open > .nav-group-links {
      display: block !important;
    }

    @media (max-width: 850px) {
      #navbar .navbar-fixed-summary {
        height: 46px !important;
        font-size: 17px !important;
      }

      #navbar .navbar-fixed-group.is-open > .nav-group-links {
        position: absolute !important;
        left: 0 !important;
        right: auto !important;
        top: auto !important;
        bottom: 100% !important;

        width: 100% !important;

        background: var(--white) !important;
        border: 3px solid var(--black) !important;
        box-shadow: 4px 4px 0 var(--black) !important;

        z-index: 999999999 !important;
      }
    }
  </style>

  <script>
    /* HTML OVERRIDE: fix phone navbar health/finance second-click close */
    (function () {
      function convertNavbarDetails() {
        const navbar = document.getElementById("navbar");
        if (!navbar) return;

        navbar
          .querySelectorAll(".dropdown-content > details.nav-group")
          .forEach(function (details) {
            const summary = details.querySelector("summary");
            const links = details.querySelector(".nav-group-links");

            if (!summary || !links) return;

            const group = document.createElement("div");
            group.className = "nav-group navbar-fixed-group";

            const button = document.createElement("button");
            button.type = "button";
            button.className = "navbar-fixed-summary";
            button.textContent = summary.textContent.trim();

            group.appendChild(button);
            group.appendChild(links.cloneNode(true));

            details.replaceWith(group);
          });
      }

      function closeAllNavbarFixedGroups(exceptGroup) {
        document
          .querySelectorAll("#navbar .navbar-fixed-group")
          .forEach(function (group) {
            if (group !== exceptGroup) {
              group.classList.remove("is-open");
            }
          });
      }

      function setupNavbarFixedClick() {
        document.addEventListener(
          "click",
          function (event) {
            const button = event.target.closest(
              "#navbar .navbar-fixed-group > .navbar-fixed-summary"
            );

            if (!button) return;

            event.preventDefault();
            event.stopPropagation();

            const group = button.closest(".navbar-fixed-group");
            const wasOpen = group.classList.contains("is-open");

            closeAllNavbarFixedGroups(group);

            if (wasOpen) {
              group.classList.remove("is-open");
            } else {
              group.classList.add("is-open");
            }
          },
          true
        );

        document.addEventListener("click", function (event) {
          const navbar = document.getElementById("navbar");
          if (!navbar) return;

          if (!navbar.contains(event.target)) {
            closeAllNavbarFixedGroups(null);
          }
        });
      }

      convertNavbarDetails();
      setupNavbarFixedClick();
    })();
  </script>
<style>
/* FINAL OVERRIDE: remove duplicate emoji/text arrows */
#navbar .navbar-fixed-summary::after {
  content: "" !important;

  display: inline-block !important;
  width: 0 !important;
  height: 0 !important;

  margin-left: 8px !important;

  font-size: 0 !important;
  line-height: 0 !important;

  background: transparent !important;
  box-shadow: none !important;
  transform: none !important;

  border-left: 6px solid transparent !important;
  border-right: 6px solid transparent !important;
  border-top: 8px solid var(--black) !important;
  border-bottom: none !important;
}

/* open arrow points left */
#navbar .navbar-fixed-group.is-open > .navbar-fixed-summary::after {
  content: "" !important;

  border-top: 6px solid transparent !important;
  border-bottom: 6px solid transparent !important;
  border-right: 8px solid var(--black) !important;
  border-left: none !important;
}
</style>
<style>
/* FINAL ARROW CLEANUP OVERRIDE */

/* Remove any old text arrows from fixed navbar buttons */
#navbar .navbar-fixed-summary::after {
  content: "" !important;

  display: inline-block !important;
  width: 0 !important;
  height: 0 !important;

  margin-left: 8px !important;

  font-size: 0 !important;
  line-height: 0 !important;

  background: transparent !important;
  box-shadow: none !important;
  transform: none !important;

  border-left: 6px solid transparent !important;
  border-right: 6px solid transparent !important;
  border-top: 8px solid var(--black) !important;
  border-bottom: none !important;
}

/* When open, use CSS triangle pointing left */
#navbar .navbar-fixed-group.is-open > .navbar-fixed-summary::after {
  content: "" !important;

  border-top: 6px solid transparent !important;
  border-bottom: 6px solid transparent !important;
  border-right: 8px solid var(--black) !important;
  border-left: none !important;
}

/* Remove old arrow from original details if any still appears */
#navbar .dropdown-content > details.nav-group > summary::after,
#navbar.open .dropdown-content > details.nav-group > summary::after {
  content: "" !important;
  display: none !important;
}
</style>

<script>
/* FINAL ARROW TEXT CLEANUP */
document.querySelectorAll("#navbar .navbar-fixed-summary").forEach(function (button) {
  button.textContent = button.textContent
    .replace(/[▼▲◀▶⬅🔽🔼]/g, "")
    .trim();
});
</script>
</body>
</html>
