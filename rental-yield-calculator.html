<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Rental Yield Calculator</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculate gross and net rental yield.">

  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=extra_design_align_20260528">
  <link rel="stylesheet" href="pc.css?v=extra_design_align_20260528" media="screen and (min-width: 851px)">
  <link rel="stylesheet" href="phone.css?v=extra_design_align_20260528" media="screen and (max-width: 850px)">
  <link rel="icon" href="favicon.ico">
</head>

<body class="extra-calculator-page rentalYield-page" data-page="rentalYield">


  <!-- Go Up Button -->
  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">
    ↑
  </button>

  <!-- MENU Button shown after scroll -->
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">
    MENU
  </button>

  <!-- Navbar -->
  <nav id="navbar">
    <a href="index.html">home</a>
    <a href="basic-calculator.html">calculator</a>
    <a href="about.html">info</a>
  </nav>


  <main class="loan-calculator-container extra-calculator-container extra-calculator-layout">

    <section class="loan-history-box extra-side-box">
      <div class="loan-history-top">
        <h3>Property &amp; travel</h3>
      </div>

      <div class="extra-side-links">
          <a href="rental-yield-calculator.html" class="current-extra-link">rental yield</a>
          <a href="fuel-cost-calculator.html">fuel cost</a>
      </div>
    </section>

    <section class="calculator extra-calculator-box">

      <h1>Rental Yield Calculator</h1>

      <p class="subtitle">
        Estimate gross and net yield from rent and property cost.
      </p>

      

      <div class="extra-input-card">
        <div class="extra-input-card-title">Input details</div>

        <div class="extra-input-grid">
          <div class="extra-input-field">
            <label for="rentalPropertyPrice">Property price</label>
            <input type="number" id="rentalPropertyPrice" placeholder="Example: 300000" inputmode="decimal">
          </div>
          <div class="extra-input-field">
            <label for="rentalMonthlyRent">Monthly rent</label>
            <input type="number" id="rentalMonthlyRent" placeholder="Example: 1500" inputmode="decimal">
          </div>
          <div class="extra-input-field">
            <label for="rentalAnnualExpenses">Annual expenses</label>
            <input type="number" id="rentalAnnualExpenses" placeholder="Optional" inputmode="decimal">
          </div>
        </div>
      </div>

      <button type="button" onclick="calculateRentalYieldExtra()" class="main-btn extra-main-btn">
        calculate rental yield
      </button>

      <section id="extraCalcResult" class="extra-result-box" hidden></section>

    </section>

  </main>

  <script src="script.js?v=extra_design_align_20260528"></script>
  <script src="pc.js?v=extra_design_align_20260528"></script>
  <script src="phone.js?v=extra_design_align_20260528"></script>
</body>
</html>
