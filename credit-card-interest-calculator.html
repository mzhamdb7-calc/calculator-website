      <h1>Credit Card Interest Calculator</h1>
      <p class="subtitle">Estimate card interest using balance, APR and days.</p>
      
      <div class="extra-input-grid">
        <label for="ccInterestBalance">Balance</label>
<input type="number" id="ccInterestBalance" placeholder="Example: 3000" inputmode="decimal">
<label for="ccInterestApr">APR (%)</label>

<input type="number" id="ccInterestPayment" placeholder="Optional" inputmode="decimal">
      </div>
      <button type="button" onclick="calculateCreditCardInterestExtra()" class="main-btn">calculate interest</button>
