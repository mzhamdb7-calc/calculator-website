<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tax Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple tax estimator using your own tax rate.">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=extra_calculators_20260528">

</head>
<body class="extra-calculator-page tax-page" data-page="tax">

  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">↑</button>
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">MENU</button>
  <nav id="navbar">
    <a href="index.html">home</a>
    <a href="basic-calculator.html">calculator</a>
    <a href="about.html">info</a>
  </nav>

  <main class="loan-calculator-container extra-calculator-container">
    <section class="calculator extra-calculator-box">
      <h1>Tax Calculator</h1>
      <p class="subtitle">Estimate tax using your entered income, relief and tax rate.</p>
      <p class="extra-page-note">This page uses the tax rate you enter manually.</p>
      <div class="extra-input-grid">
        <label for="taxAnnualIncome">Annual income</label>
<input type="number" id="taxAnnualIncome" placeholder="Example: 60000" inputmode="decimal">
<label for="taxRelief">Relief / deduction</label>
<input type="number" id="taxRelief" placeholder="Optional" inputmode="decimal">
<label for="taxRate">Estimated tax rate (%)</label>
<input type="number" id="taxRate" placeholder="Example: 10" inputmode="decimal">
      </div>
      <button type="button" onclick="calculateTaxExtra()" class="main-btn">calculate tax</button>
      <section id="extraCalcResult" class="extra-result-box" hidden></section>
    </section>
  </main>
  <script src="script.js?v=extra_calculators_20260528"></script>
  <script src="pc.js?v=extra_calculators_20260528"></script>
  <script src="phone.js?v=extra_calculators_20260528"></script>
