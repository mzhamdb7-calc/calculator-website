<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unit Converter Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert length, weight, volume and temperature units.">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=extra_calculators_20260528">

  <link rel="icon" href="favicon.ico">
</head>
<body class="extra-calculator-page unitConverter-page" data-page="unitConverter">

  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">↑</button>
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">MENU</button>
  <nav id="navbar">
    <a href="index.html">home</a>
    <a href="basic-calculator.html">calculator</a>
    <a href="about.html">info</a>
  </nav>

  <main class="loan-calculator-container extra-calculator-container">
    <section class="calculator extra-calculator-box">
      <h1>Unit Converter Calculator</h1>
      <p class="subtitle">Choose a unit type and convert between units.</p>
      <p class="extra-page-note">Examples: length km to mile, weight kg to lb, volume liter to gallon, temperature c to f.</p>
      <div class="extra-input-grid">
        <label for="unitType">Unit type</label>
<select id="unitType"><option value="length">Length</option>
<option value="weight">Weight</option>
<option value="volume">Volume</option>
<option value="temperature">Temperature</option></select>
<label for="unitValue">Value</label>
<input type="number" id="unitValue" placeholder="Example: 100" inputmode="decimal">
<label for="unitFrom">From unit</label>
<input type="text" id="unitFrom" placeholder="Example: km, kg, liter, c">
<label for="unitTo">To unit</label>
<input type="text" id="unitTo" placeholder="Example: mile, lb, gallon, f">
      </div>
      <button type="button" onclick="calculateUnitConverterExtra()" class="main-btn">convert unit</button>
      <section id="extraCalcResult" class="extra-result-box" hidden></section>
    </section>
  </main>
  <script src="script.js?v=extra_calculators_20260528"></script>
  <script src="pc.js?v=extra_calculators_20260528"></script>
  <script src="phone.js?v=extra_calculators_20260528"></script>
</body>
