<!-- Main Content -->
<main class="bmi-calculator-container">
<section class="bmi-history-box">
<div class="bmi-history-top">
<h3>History</h3>
<button class="clear-btn" onclick="clearBMIHistory()" type="button">
          Clear
        </button>
</div>
<ul id="bmiHistoryList"></ul>
</section>
<section class="calculator bmi-calculator-box">
<div class="bmi-title-row">
<div></div>
<div>
<h1>BMI Calculator</h1>
<p class="subtitle">
            Check your Body Mass Index.
          </p>
</div>
<button data-current-unit="si" id="unitToggleBtn" onclick="toggleBMIUnit()" type="button">
  SI
</button>
</div>
<label for="weight" id="weightLabel">Weight in kg:</label>
<input id="weight" placeholder="Example: 70" type="number"/>
<label for="height" id="heightLabel">Height in cm:</label>
<input id="height" placeholder="Example: 170" type="number"/>
<label for="waist" id="waistLabel">Waist circumference in cm:</label>
<input id="waist" placeholder="Optional, Example: 80" type="number"/>

<h2 id="bmiResult"></h2>
</section>
