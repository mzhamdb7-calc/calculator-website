  <!-- Main Content -->
  <main class="bmi-calculator-container">

    <section class="bmi-history-box">

      <div class="bmi-history-top">
        <h3>Result</h3>

        <button type="button" onclick="clearBMIHistory()" class="clear-btn">
          Clear
        </button>
      </div>

      <ul id="bmiHistoryList"></ul>

    </section>

    <section class="calculator bmi-calculator-box">

      <div class="bmi-title-row">
        <div></div>

        <div>
          <h1>BMI Calculator</h1>

          <p class="subtitle">
            Check your Body Mass Index.
          </p>
        </div>

        <button type="button" id="unitToggleBtn" onclick="toggleBMIUnit()">
          SI / US
        </button>
      </div>

      <label for="weight" id="weightLabel">Weight in kg:</label>
      <input type="number" id="weight" placeholder="Example: 70">

      <label for="height" id="heightLabel">Height in cm:</label>
      <input type="number" id="height" placeholder="Example: 170">

      <label for="waist" id="waistLabel">Waist circumference in cm:</label>
      <input type="number" id="waist" placeholder="Optional, Example: 80">

      <button type="button" onclick="calculateBMI()" class="main-btn">
        calculate bmi
      </button>

      <h2 id="bmiResult"></h2>

    </section>

  </main>

  <script src="script.js"></script>

  <script>
    let bmiHistory = [];
    let bmiUnit = "si";

    try {
      bmiHistory = JSON.parse(localStorage.getItem("bmiHistory")) || [];
    } catch {
      bmiHistory = [];
    }

    try {
      bmiUnit = localStorage.getItem("bmiUnit") || "si";
    } catch {
      bmiUnit = "si";
    }

    function toggleBMIUnit() {
      if (bmiUnit === "si") {
        bmiUnit = "us";
      } else {
        bmiUnit = "si";
      }

      localStorage.setItem("bmiUnit", bmiUnit);
      updateBMIUnitLabels();
      clearBMIInputs();
    }

    function updateBMIUnitLabels() {
      const weightLabel = document.getElementById("weightLabel");
      const heightLabel = document.getElementById("heightLabel");
      const waistLabel = document.getElementById("waistLabel");

      const weight = document.getElementById("weight");
      const height = document.getElementById("height");
      const waist = document.getElementById("waist");

      const unitBtn = document.getElementById("unitToggleBtn");

      if (!weightLabel || !heightLabel || !waistLabel || !weight || !height || !waist || !unitBtn) {
        return;
      }

      if (bmiUnit === "si") {
        weightLabel.innerText = "Weight in kg:";
        heightLabel.innerText = "Height in cm:";
        waistLabel.innerText = "Waist circumference in cm:";

        weight.placeholder = "Example: 70";
        height.placeholder = "Example: 170";
        waist.placeholder = "Optional, Example: 80";

        unitBtn.innerText = "SI / US";
      } else {
        weightLabel.innerText = "Weight in lb:";
        heightLabel.innerText = "Height in inch:";
        waistLabel.innerText = "Waist circumference in inch:";

        weight.placeholder = "Example: 154";
        height.placeholder = "Example: 67";
        waist.placeholder = "Optional, Example: 31";

        unitBtn.innerText = "US / SI";
      }
    }

    function clearBMIInputs() {
      document.getElementById("weight").value = "";
      document.getElementById("height").value = "";
      document.getElementById("waist").value = "";
      document.getElementById("bmiResult").innerText = "";
    }

    function calculateBMI() {
      const weight = Number(document.getElementById("weight").value);
      const height = Number(document.getElementById("height").value);
      const waistInput = document.getElementById("waist").value;
      const waist = Number(waistInput);
      const result = document.getElementById("bmiResult");

      if (weight <= 0 || height <= 0) {
        result.innerText = "Please enter valid weight and height values.";
        return;
      }

      let bmi;

      if (bmiUnit === "si") {
        const heightM = height / 100;
        bmi = weight / (heightM * heightM);
      } else {
        bmi = 703 * weight / (height * height);
      }

      let bmiCategory = "";

      if (bmi < 18.5) {
        bmiCategory = "Underweight";
      } else if (bmi < 25) {
        bmiCategory = "Healthy BMI";
      } else if (bmi < 30) {
        bmiCategory = "Overweight";
      } else {
        bmiCategory = "Obese";
      }

      let answer =
        "BMI: " + bmi.toFixed(2) + "\n" +
        "BMI status: " + bmiCategory;

      if (waistInput !== "") {
        if (waist <= 0) {
          result.innerText = "Please enter a valid waist value, or leave it empty.";
          return;
        }

        const whRatio = waist / height;

        let condition = "";

        if (whRatio < 0.5) {
          condition = "Healthy";
        } else {
          condition = "Unhealthy";
        }

        answer +=
          "\nW/H ratio: " + whRatio.toFixed(2) +
          "\nCondition: " + condition;
      }

      result.innerText = answer;

      saveBMIHistory(weight, height, waistInput, answer);
    }

    function saveBMIHistory(weight, height, waist, answer) {
      const weightUnit = bmiUnit === "si" ? "kg" : "lb";
      const heightUnit = bmiUnit === "si" ? "cm" : "inch";

      let item =
        "Unit: " + bmiUnit.toUpperCase() + " | " +
        "Weight: " + weight + weightUnit + " | " +
        "Height: " + height + heightUnit;

      if (waist !== "") {
        item += " | Waist: " + waist + heightUnit;
      }

      item += " → " + answer.replace(/\n/g, " | ");

      bmiHistory.push(item);

      if (bmiHistory.length > 50) {
        bmiHistory.shift();
      }

      localStorage.setItem("bmiHistory", JSON.stringify(bmiHistory));

      showBMIHistory();
    }

    function showBMIHistory() {
      const list = document.getElementById("bmiHistoryList");

      if (!list) return;

      list.innerHTML = "";

      bmiHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.className = "history-item";

        const text = document.createElement("span");
        text.className = "history-text";
        text.textContent = item;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "history-copy-btn";
        copyBtn.textContent = "copy";

        copyBtn.onclick = function () {
          copyBMIText(item, copyBtn);
        };

        li.appendChild(text);
        li.appendChild(copyBtn);

        list.appendChild(li);
      });
    }

    function copyBMIText(text, button) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(function () {
            showBMICopied(button);
          })
          .catch(function () {
            fallbackBMICopy(text, button);
          });
      } else {
        fallbackBMICopy(text, button);
      }
    }

    function fallbackBMICopy(text, button) {
      const tempInput = document.createElement("textarea");

      tempInput.value = text;
      tempInput.style.position = "fixed";
      tempInput.style.left = "-9999px";
      tempInput.style.top = "-9999px";

      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand("copy");
        showBMICopied(button);
      } catch {
        button.textContent = "failed";

        setTimeout(function () {
          button.textContent = "copy";
        }, 1000);
      }

      document.body.removeChild(tempInput);
    }

    function showBMICopied(button) {
      button.textContent = "copied";

      setTimeout(function () {
        button.textContent = "copy";
      }, 1000);
    }

    function clearBMIHistory() {
      bmiHistory = [];
      localStorage.removeItem("bmiHistory");
      showBMIHistory();

      const result = document.getElementById("bmiResult");
      if (result) result.innerText = "";
    }

    document.addEventListener("DOMContentLoaded", function () {
      updateBMIUnitLabels();
      showBMIHistory();
    });
  </script>

<script>
/* OVERRIDE: fix phone navbar health/finance second-click close */
(function () {
  function convertNavbarDetails() {
    const navbar = document.getElementById("navbar");
    if (!navbar) return;

    navbar
      .querySelectorAll(".dropdown-content > details.nav-group")
      .forEach(function (details) {
        const summary = details.querySelector("summary");
        const links = details.querySelector(".nav-group-links");

        if (!summary || !links) return;

        const group = document.createElement("div");
        group.className = "nav-group navbar-fixed-group";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "navbar-fixed-summary";
        button.textContent = summary.textContent
          .replace(/[▼▲◀▶⬅🔽🔼]/g, "")
          .trim();

        group.appendChild(button);
        group.appendChild(links.cloneNode(true));

        details.replaceWith(group);
      });
  }

  function closeAllNavbarFixedGroups(exceptGroup) {
    document
      .querySelectorAll("#navbar .navbar-fixed-group")
      .forEach(function (group) {
        if (group !== exceptGroup) {
          group.classList.remove("is-open");
        }
      });
  }

  function setupNavbarFixedClick() {
    document.addEventListener(
      "click",
      function (event) {
        const button = event.target.closest(
          "#navbar .navbar-fixed-group > .navbar-fixed-summary"
        );

        if (!button) return;

        event.preventDefault();
        event.stopPropagation();

        const group = button.closest(".navbar-fixed-group");
        const wasOpen = group.classList.contains("is-open");

        closeAllNavbarFixedGroups(group);

        if (wasOpen) {
          group.classList.remove("is-open");
        } else {
          group.classList.add("is-open");
        }
      },
      true
    );

    document.addEventListener("click", function (event) {
      const navbar = document.getElementById("navbar");
      if (!navbar) return;

      if (!navbar.contains(event.target)) {
        closeAllNavbarFixedGroups(null);
      }
    });
  }

  convertNavbarDetails();
  setupNavbarFixedClick();
})();
</script>
