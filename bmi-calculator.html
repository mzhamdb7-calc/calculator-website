<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculate your BMI with this free online Body Mass Index calculator.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">

      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">
        <a href="basic-calculator.html">basic</a>
        <a href="age-calculator.html">age</a>
        <a href="bmi-calculator.html">bmi</a>
        <a href="discount-calculator.html">discount</a>
        <a href="loan-calculator.html">loan</a>
        <a href="percentage-calculator.html">percentage</a>
      </div>

    </div>

    <a href="about.html">about</a>

  </nav>

  <button id="menuIcon" onclick="toggleMenu()">☰</button>

  <main class="single-calculator-container">

    <section class="calculator">

      <h1>BMI Calculator</h1>

      <p class="subtitle">
        Check your Body Mass Index.
      </p>

      <label for="weight">Weight in kg:</label>
      <input type="number" id="weight" placeholder="Example: 70">

      <label for="height">Height in cm:</label>
      <input type="number" id="height" placeholder="Example: 170">

      <button type="button" onclick="calculateBMI()" class="main-btn">
        calculate bmi
      </button>

      <h2 id="bmiResult"></h2>

    </section>

  </main>

  <script src="script.js"></script>
  
  <script>
   

    function calculateBMI() {
      const weight = Number(document.getElementById("weight").value);
      const heightCm = Number(document.getElementById("height").value);
      const result = document.getElementById("bmiResult");

      if (weight <= 0 || heightCm <= 0) {
        result.innerText = "Please enter a valid weight and height.";
        return;
      }

      const heightM = heightCm / 100;
      const bmi = weight / (heightM * heightM);

      let category = "";

      if (bmi < 18.5) {
        category = "Underweight";
      } else if (bmi < 25) {
        category = "Normal weight";
      } else if (bmi < 30) {
        category = "Overweight";
      } else {
        category = "Obese";
      }

      result.innerText = "Your BMI is " + bmi.toFixed(2) + " — " + category;
    }
  </script>

</body>
</html>
