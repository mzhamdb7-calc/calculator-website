<!DOCTYPE html>
<html>
<head>
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online calculators for BMI, age, percentages, loans and more.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<script>
window.addEventListener("scroll", function(){
  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");

  if(window.scrollY > 80){
    navbar.classList.add("scrolled");
    menuIcon.classList.add("show");
  }else{
    navbar.classList.remove("scrolled");
    navbar.classList.remove("open");
    menuIcon.classList.remove("show");
  }
});

function toggleMenu(){
  document.getElementById("navbar").classList.toggle("open");
}
</script>
<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script>

window.addEventListener("scroll", function(){

  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");
  const scrollBtn = document.getElementById("scrollTopBtn");

  if(window.scrollY > 80){

    navbar.style.top = "120px";

    scrollBtn.style.display = "flex";

  }else{

    navbar.style.top = "25px";

    scrollBtn.style.display = "none";
  }

});

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

</script>
<body>

<nav id="navbar">

  <a href="index.html">Home</a>

  <div class="dropdown">
    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>
  </div>

  <a href="about.html">About</a>

</nav>

<button id="menuIcon" onclick="toggleMenu()">☰</button>

<div class="calculator">
  <h1>BMI Calculator</h1>

  <p class="subtitle">Check your Body Mass Index.</p>

  <input type="number" id="weight" placeholder="Weight in kg">
  <br><br>
  <input type="number" id="height" placeholder="Height in cm">
  <br><br>

  <button onclick="calculateBMI()">Calculate BMI</button>

  <h2 id="bmiResult"></h2>
</div>

<script>
function calculateBMI(){
  let weight = document.getElementById("weight").value;
  let height = document.getElementById("height").value / 100;

  let bmi = weight / (height * height);

  document.getElementById("bmiResult").innerText = "Your BMI is " + bmi.toFixed(2);
}
</script>

</body>
</html>
