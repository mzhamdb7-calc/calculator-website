<!DOCTYPE html>

  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculate your age instantly with this free online age calculator.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">

      <button type="button" class="dropbtn">
        calculator

    </div>

    <a href="about.html">about</a>

  </nav>

  <button id="menuIcon" onclick="toggleMenu()">☰</button>

  <main class="single-calculator-container">

    <section class="calculator">

      <h1>Age Calculator</h1>

      <p class="subtitle">
        Calculate your age instantly.
      </p>

      <label for="birthdate">Enter your birth date:</label>

      <input type="date" id="birthdate">

      <button type="button" onclick="calculateAge()" class="main-btn">
        calculate age
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>
  
  <script>
    

    function calculateAge() {
      const birthdateInput = document.getElementById("birthdate").value;
      const result = document.getElementById("result");

      if (birthdateInput === "") {
        result.innerText = "Please select your birth date.";
        return;
      }

      const birthdate = new Date(birthdateInput);
      const today = new Date();

      if (birthdate > today) {
        result.innerText = "Birth date cannot be in the future.";
        return;
      }

      let age = today.getFullYear() - birthdate.getFullYear();
      const month = today.getMonth() - birthdate.getMonth();

      if (month < 0 || (month === 0 && today.getDate() < birthdate.getDate())) {
        age--;
      }

      result.innerText = "You are " + age + " years old.";
    }
  </script>

</body>
