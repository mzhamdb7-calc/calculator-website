<!DOCTYPE html>
<html>
<head>
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online calculators for BMI, age, percentages, loans and more.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>
<script>

window.addEventListener("scroll", function(){

  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");
  const scrollBtn = document.getElementById("scrollTopBtn");

  if(window.scrollY > 80){

    navbar.classList.add("scrolled");
    menuIcon.classList.add("show");

    navbar.style.top = "120px";

  }else{

    navbar.classList.remove("scrolled");
    navbar.classList.remove("open");
    menuIcon.classList.remove("show");

    navbar.style.top = "25px";
  }

  if(window.scrollY > 200){

    scrollBtn.style.display = "flex";

  }else{

    scrollBtn.style.display = "none";
  }

});

function toggleMenu(){

  document.getElementById("navbar").classList.toggle("open");

}

function scrollToTop(){

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

</script>
<body>

<nav id="navbar">

  <a href="index.html">Home</a>

  <div class="dropdown">
    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>
  </div>

  <a href="about.html">About</a>

</nav>

<button id="menuIcon" onclick="toggleMenu()">☰</button>

<div class="calculator">

  <h1>Age Calculator</h1>

  <p class="subtitle">Calculate your age instantly.</p>

  <input type="date" id="birthdate">

  <br><br>

  <button onclick="calculateAge()">Calculate Age</button>

  <h2 id="result"></h2>

</div>

<script>

function calculateAge(){

  let birthdate = new Date(document.getElementById("birthdate").value);

  let today = new Date();

  let age = today.getFullYear() - birthdate.getFullYear();

  let month = today.getMonth() - birthdate.getMonth();

  if(month < 0 || (month === 0 && today.getDate() < birthdate.getDate())){
    age--;
  }

  document.getElementById("result").innerText =
  "You are " + age + " years old.";

}

</script>

</body>
</html>
