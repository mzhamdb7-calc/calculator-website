<!DOCTYPE html>
<html lang="en">
<head>

  <title>Age Calculator</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculate your normal age and Asian age instantly with this free online age calculator.">

  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <!-- Go Up Button -->
  <button id="scrollTopBtn" type="button" onclick="scrollToTop()" aria-label="Go to top">
    ↑
  </button>

  <!-- MENU Button shown after scroll -->
  <button id="menuIcon" type="button" onclick="toggleMenu()" aria-label="Open menu">
    MENU
  </button>

  <!-- Navbar -->
  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">
      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">

        <a href="basic-calculator.html">basic</a>

        <details class="nav-group">
          <summary>health</summary>

          <div class="nav-group-links">
            <a href="age-calculator.html">age</a>
            <a href="bmi-calculator.html">bmi</a>
          </div>
        </details>

        <details class="nav-group">
          <summary>finance</summary>

          <div class="nav-group-links">
            <a href="loan-calculator.html">loan</a>
            <a href="discount-calculator.html">discount</a>
          </div>
        </details>

        <a href="percentage-calculator.html">percentage</a>

      </div>
    </div>

    <a href="about.html">about</a>

  </nav>

  <!-- Main Content -->
  <main class="age-calculator-container">

    <section class="age-history-box">

      <div class="age-history-top">
        <h3>Result</h3>

        <button type="button" onclick="clearAgeHistory()" class="clear-btn">
          Clear
        </button>
      </div>

      <ul id="ageHistoryList"></ul>

    </section>

    <section class="calculator">

      <h1>Age Calculator</h1>

      <p class="subtitle">
        Calculate your normal age and Asian age instantly.
      </p>

      <label for="birthdate">Enter your birth date:</label>

      <input type="date" id="birthdate">

      <button type="button" onclick="calculateAge()" class="main-btn">
        calculate age
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

  <script>
    let ageHistory = [];

    try {
      ageHistory = JSON.parse(localStorage.getItem("ageHistory")) || [];
    } catch {
      ageHistory = [];
    }

    function calculateAge() {
      const birthdateInput = document.getElementById("birthdate").value;
      const result = document.getElementById("result");

      if (birthdateInput === "") {
        result.innerText = "Please select your birth date.";
        return;
      }

      const parts = birthdateInput.split("-");
      const birthYear = Number(parts[0]);
      const birthMonth = Number(parts[1]) - 1;
      const birthDay = Number(parts[2]);

      const birthdate = new Date(birthYear, birthMonth, birthDay);
      const today = new Date();

      if (birthdate > today) {
        result.innerText = "Birth date cannot be in the future.";
        return;
      }

      let normalAge = today.getFullYear() - birthdate.getFullYear();
      const monthDiff = today.getMonth() - birthdate.getMonth();

      if (
        monthDiff < 0 ||
        (monthDiff === 0 && today.getDate() < birthdate.getDate())
      ) {
        normalAge--;
      }

      const asianAge = today.getFullYear() - birthYear + 1;

      const formattedDate =
        String(birthDay).padStart(2, "0") + "/" +
        String(birthMonth + 1).padStart(2, "0") + "/" +
        birthYear;

      const answer =
        "Normal age: " + normalAge + " years old.\n" +
        "Asian age: " + asianAge + " years old.";

      result.innerText = answer;

      saveAgeHistory(formattedDate, answer);
    }

    function saveAgeHistory(inputDate, answer) {
      const item = inputDate + " → " + answer.replace("\n", " | ");

      ageHistory.push(item);

      if (ageHistory.length > 50) {
        ageHistory.shift();
      }

      localStorage.setItem("ageHistory", JSON.stringify(ageHistory));

      showAgeHistory();
    }

    function showAgeHistory() {
      const list = document.getElementById("ageHistoryList");

      if (!list) return;

      list.innerHTML = "";

      ageHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
    }

    function clearAgeHistory() {
      ageHistory = [];
      localStorage.removeItem("ageHistory");

      showAgeHistory();

      const result = document.getElementById("result");
      if (result) result.innerText = "";
    }

    document.addEventListener("DOMContentLoaded", showAgeHistory);
  </script>
<style>

  border-bottom: 3px solid var(--black) !important;

  font-family: inherit !important;

  cursor: pointer !important;
}

  display: inline-block !important;

  background: transparent !important;
  box-shadow: none !important;

  border-left: 6px solid transparent !important;
  border-right: 6px solid transparent !important;

  border-bottom: none !important;
}

#navbar .navbar-fixed-group.is-open > .navbar-fixed-summary {

}

#navbar .navbar-fixed-group.is-open > .navbar-fixed-summary::after {

  border-bottom: 6px solid transparent !important;
  border-right: 8px solid var(--black) !important;
  border-left: none !important;

</style>

<script>
/* OVERRIDE: fix phone navbar health/finance second-click close */
(function () {
  function convertNavbarDetails() {
    const navbar = document.getElementById("navbar");
    if (!navbar) return;

    navbar
      .querySelectorAll(".dropdown-content > details.nav-group")
      .forEach(function (details) {
        const summary = details.querySelector("summary");
        const links = details.querySelector(".nav-group-links");

        if (!summary || !links) return;

        const group = document.createElement("div");
        group.className = "nav-group navbar-fixed-group";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "navbar-fixed-summary";
        button.textContent = summary.textContent
          .replace(/[▼▲◀▶⬅🔽🔼]/g, "")
          .trim();

        group.appendChild(button);
        group.appendChild(links.cloneNode(true));

        details.replaceWith(group);
      });
  }

  function closeAllNavbarFixedGroups(exceptGroup) {
    document
      .querySelectorAll("#navbar .navbar-fixed-group")
      .forEach(function (group) {
        if (group !== exceptGroup) {
          group.classList.remove("is-open");
        }
      });
  }

  function setupNavbarFixedClick() {
    document.addEventListener(
      "click",
      function (event) {
        const button = event.target.closest(
          "#navbar .navbar-fixed-group > .navbar-fixed-summary"
        );

        if (!button) return;

        event.preventDefault();
        event.stopPropagation();

        const group = button.closest(".navbar-fixed-group");
        const wasOpen = group.classList.contains("is-open");

        closeAllNavbarFixedGroups(group);

        if (wasOpen) {
          group.classList.remove("is-open");
        } else {
          group.classList.add("is-open");
        }
      },
      true
    );

    document.addEventListener("click", function (event) {
      const navbar = document.getElementById("navbar");
      if (!navbar) return;

      if (!navbar.contains(event.target)) {
        closeAllNavbarFixedGroups(null);
      }
    });
  }

  convertNavbarDetails();
  setupNavbarFixedClick();
})();
</script>
</body>
</html>
