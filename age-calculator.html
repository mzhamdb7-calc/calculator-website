  <!-- Main Content -->
  <main class="age-calculator-container">

    <section class="age-history-box">

      <div class="age-history-top">
        <h3>Result</h3>

        <button type="button" onclick="clearAgeHistory()" class="clear-btn">
          Clear
        </button>
      </div>

      <ul id="ageHistoryList"></ul>

    </section>

    <section class="calculator">

      <h1>Age Calculator</h1>

      <p class="subtitle">
        Calculate your normal age and Asian age instantly.
      </p>

      <label for="birthdate">Enter your birth date:</label>

      <input type="date" id="birthdate">

      <button type="button" onclick="calculateAge()" class="main-btn">
        calculate age
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

  <script>
    let ageHistory = [];

    try {
      ageHistory = JSON.parse(localStorage.getItem("ageHistory")) || [];
    } catch {
      ageHistory = [];
    }

    function calculateAge() {
      const birthdateInput = document.getElementById("birthdate").value;
      const result = document.getElementById("result");

      if (birthdateInput === "") {
        result.innerText = "Please select your birth date.";
        return;
      }

      const parts = birthdateInput.split("-");
      const birthYear = Number(parts[0]);
      const birthMonth = Number(parts[1]) - 1;
      const birthDay = Number(parts[2]);

      const birthdate = new Date(birthYear, birthMonth, birthDay);
      const today = new Date();

      if (birthdate > today) {
        result.innerText = "Birth date cannot be in the future.";
        return;
      }

      let normalAge = today.getFullYear() - birthdate.getFullYear();
      const monthDiff = today.getMonth() - birthdate.getMonth();

      if (
        monthDiff < 0 ||
        (monthDiff === 0 && today.getDate() < birthdate.getDate())
      ) {
        normalAge--;
      }

      const asianAge = today.getFullYear() - birthYear + 1;

      const formattedDate =
        String(birthDay).padStart(2, "0") + "/" +
        String(birthMonth + 1).padStart(2, "0") + "/" +
        birthYear;

      const answer =
        "Normal age: " + normalAge + " years old.\n" +
        "Asian age: " + asianAge + " years old.";

      result.innerText = answer;

      saveAgeHistory(formattedDate, answer);
    }

    function saveAgeHistory(inputDate, answer) {
      const item = inputDate + " → " + answer.replace(/\n/g, " | ");

      ageHistory.push(item);

      if (ageHistory.length > 50) {
        ageHistory.shift();
      }

      try {
        localStorage.setItem("ageHistory", JSON.stringify(ageHistory));
      } catch {
        /* ignore storage errors */
      }

      showAgeHistory();
    }

    function showAgeHistory() {
      const list = document.getElementById("ageHistoryList");

      if (!list) return;

      list.innerHTML = "";

      ageHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.className = "history-item";

        const text = document.createElement("span");
        text.className = "history-text";
        text.textContent = item;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "history-copy-btn";
        copyBtn.textContent = "copy";

        copyBtn.onclick = function () {
          copyAgeText(item, copyBtn);
        };

        li.appendChild(text);
        li.appendChild(copyBtn);

        list.appendChild(li);
      });
    }

    function copyAgeText(text, button) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(function () {
            showAgeCopied(button);
          })
          .catch(function () {
            fallbackAgeCopy(text, button);
          });
      } else {
        fallbackAgeCopy(text, button);
      }
    }

    function fallbackAgeCopy(text, button) {
      const tempInput = document.createElement("textarea");

      tempInput.value = text;
      tempInput.style.position = "fixed";
      tempInput.style.left = "-9999px";
      tempInput.style.top = "-9999px";

      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand("copy");
        showAgeCopied(button);
      } catch {
        button.textContent = "failed";

        setTimeout(function () {
          button.textContent = "copy";
        }, 1000);
      }

      document.body.removeChild(tempInput);
    }

    function showAgeCopied(button) {
      button.textContent = "copied";

      setTimeout(function () {
        button.textContent = "copy";
      }, 1000);
    }

    function clearAgeHistory() {
      ageHistory = [];

      try {
        localStorage.removeItem("ageHistory");
      } catch {
        /* ignore storage errors */
      }

      showAgeHistory();

      const result = document.getElementById("result");

      if (result) {
        result.innerText = "";
      }
    }

    document.addEventListener("DOMContentLoaded", showAgeHistory);
  </script>

</body>
