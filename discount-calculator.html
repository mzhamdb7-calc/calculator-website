  <main class="discount-calculator-container">

    <section class="discount-history-box">

    <section class="calculator">

      <h1>Discount Calculator</h1>

      <p class="subtitle">
        Calculate final price after discount.
      </p>

      <label for="price">Original price:</label>
      <input type="number" id="price" placeholder="Example: 100">

      <label for="discount">Discount percentage:</label>
      <input type="number" id="discount" placeholder="Example: 20">

      <button type="button" onclick="calculateDiscount()" class="main-btn">
        calculate discount
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

  <script>
    let discountHistory = [];

    try {
      discountHistory = JSON.parse(localStorage.getItem("discountHistory")) || [];
    } catch {
      discountHistory = [];
    }

    function calculateDiscount() {
      const price = Number(document.getElementById("price").value);
      const discount = Number(document.getElementById("discount").value);
      const result = document.getElementById("result");

      if (price <= 0) {
        result.innerText = "Please enter a valid original price.";
        return;
      }

      if (discount < 0 || discount > 100) {
        result.innerText = "Please enter a discount between 0 and 100.";
        return;
      }

      const savings = price * discount / 100;
      const finalPrice = price - savings;

      const answer =
        "Original price: " + price.toFixed(2) + "\n" +
        "Discount: " + discount + "%\n" +
        "Final price: " + finalPrice.toFixed(2) + "\n" +
        "You save: " + savings.toFixed(2);

      result.innerText = answer;

      saveDiscountHistory(answer);
    }

    function saveDiscountHistory(answer) {
      const item = answer.replace(/\n/g, " | ");

      discountHistory.push(item);

      if (discountHistory.length > 50) {
        discountHistory.shift();
      }

      localStorage.setItem("discountHistory", JSON.stringify(discountHistory));

      showDiscountHistory();
    }

    function showDiscountHistory() {
      const list = document.getElementById("discountHistoryList");

      if (!list) return;

      list.innerHTML = "";

      discountHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.className = "history-item";

        const text = document.createElement("span");
        text.className = "history-text";
        text.textContent = item;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "history-copy-btn";
        copyBtn.textContent = "copy";

        copyBtn.onclick = function () {
          copyDiscountText(item, copyBtn);
        };

        li.appendChild(text);
        li.appendChild(copyBtn);

        list.appendChild(li);
      });
    }

    function copyDiscountText(text, button) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(function () {
            showDiscountCopied(button);
          })
          .catch(function () {
            fallbackDiscountCopy(text, button);
          });
      } else {
        fallbackDiscountCopy(text, button);
      }
    }

    function fallbackDiscountCopy(text, button) {
      const tempInput = document.createElement("textarea");

      tempInput.value = text;
      tempInput.style.position = "fixed";
      tempInput.style.left = "-9999px";
      tempInput.style.top = "-9999px";

      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand("copy");
        showDiscountCopied(button);
      } catch {
        button.textContent = "failed";

        setTimeout(function () {
          button.textContent = "copy";
        }, 1000);
      }

      document.body.removeChild(tempInput);
    }

    function showDiscountCopied(button) {
      button.textContent = "copied";

      setTimeout(function () {
        button.textContent = "copy";
      }, 1000);
    }

    function clearDiscountHistory() {
      discountHistory = [];
      localStorage.removeItem("discountHistory");

      showDiscountHistory();

      const result = document.getElementById("result");
      if (result) result.innerText = "";
    }

    document.addEventListener("DOMContentLoaded", showDiscountHistory);
  </script>

<script>
/* OVERRIDE: fix phone navbar health/finance second-click close */
(function () {
  function convertNavbarDetails() {
    const navbar = document.getElementById("navbar");
    if (!navbar) return;

    navbar
      .querySelectorAll(".dropdown-content > details.nav-group")
      .forEach(function (details) {
        const summary = details.querySelector("summary");
        const links = details.querySelector(".nav-group-links");

        if (!summary || !links) return;

        const group = document.createElement("div");
        group.className = "nav-group navbar-fixed-group";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "navbar-fixed-summary";
        button.textContent = summary.textContent
          .replace(/[▼▲◀▶⬅🔽🔼]/g, "")
          .trim();

        group.appendChild(button);
        group.appendChild(links.cloneNode(true));

        details.replaceWith(group);
      });
  }

  function closeAllNavbarFixedGroups(exceptGroup) {
    document
      .querySelectorAll("#navbar .navbar-fixed-group")
      .forEach(function (group) {
        if (group !== exceptGroup) {
          group.classList.remove("is-open");
        }
      });
  }

  function setupNavbarFixedClick() {
    document.addEventListener(
      "click",
      function (event) {
        const button = event.target.closest(
          "#navbar .navbar-fixed-group > .navbar-fixed-summary"
        );

        if (!button) return;

        event.preventDefault();
        event.stopPropagation();

        const group = button.closest(".navbar-fixed-group");
        const wasOpen = group.classList.contains("is-open");

        closeAllNavbarFixedGroups(group);

        if (wasOpen) {
          group.classList.remove("is-open");
        } else {
          group.classList.add("is-open");
        }
      },
      true
    );

    document.addEventListener("click", function (event) {
      const navbar = document.getElementById("navbar");
      if (!navbar) return;

      if (!navbar.contains(event.target)) {
        closeAllNavbarFixedGroups(null);
      }
    });
  }

  convertNavbarDetails();
  setupNavbarFixedClick();
})();
</script>
