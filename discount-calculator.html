<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discount Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free discount calculator to calculate sale price and savings online.">
</head>

<body>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <nav id="navbar">

    <a href="index.html">home</a>

    <div class="dropdown">

      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">
        <a href="basic-calculator.html">basic</a>
        <a href="age-calculator.html">age</a>
        <a href="bmi-calculator.html">bmi</a>
        <a href="discount-calculator.html">discount</a>
        <a href="loan-calculator.html">loan</a>
        <a href="percentage-calculator.html">percentage</a>
      </div>

    </div>

    <a href="about.html">about</a>

  </nav>

  <button id="menuIcon" onclick="toggleMenu()">☰</button>

  <main class="single-calculator-container">

    <section class="calculator">

      <h1>Discount Calculator</h1>

      <p class="subtitle">
        Calculate final price after discount.
      </p>

      <label for="price">Original price:</label>
      <input type="number" id="price" placeholder="Example: 100">

      <label for="discount">Discount percentage:</label>
      <input type="number" id="discount" placeholder="Example: 20">

      <button type="button" onclick="calculateDiscount()" class="main-btn">
        calculate discount
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>
  <script>
   

    function calculateDiscount() {
      const price = Number(document.getElementById("price").value);
      const discount = Number(document.getElementById("discount").value);
      const result = document.getElementById("result");

      if (price <= 0) {
        result.innerText = "Please enter a valid original price.";
        return;
      }

      if (discount < 0 || discount > 100) {
        result.innerText = "Please enter a discount between 0 and 100.";
        return;
      }

      const savings = price * discount / 100;
      const finalPrice = price - savings;

      result.innerText =
        "Final price: " + finalPrice.toFixed(2) +
        " | You save: " + savings.toFixed(2);
    }
  </script>

</body>
</html>
