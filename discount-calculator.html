<!DOCTYPE html>
<html>
<head>
  <title>Discount Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free discount calculator to calculate sale price and savings online.">
</head>

<script>

window.addEventListener("scroll", function(){

  const navbar = document.getElementById("navbar");
  const menuIcon = document.getElementById("menuIcon");
  const scrollBtn = document.getElementById("scrollTopBtn");

  if(window.scrollY > 80){

    navbar.classList.add("scrolled");
    menuIcon.classList.add("show");

    navbar.style.top = "120px";

  }else{

    navbar.classList.remove("scrolled");
    navbar.classList.remove("open");
    menuIcon.classList.remove("show");

    navbar.style.top = "25px";
  }

  if(window.scrollY > 200){

    scrollBtn.style.display = "flex";

  }else{

    scrollBtn.style.display = "none";
  }

});

function toggleMenu(){

  document.getElementById("navbar").classList.toggle("open");

}

function scrollToTop(){

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

</script>
<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>
<body>

<nav id="navbar">

  <a href="index.html">Home</a>

  <div class="dropdown">
    <button class="dropbtn">Calculators ▼</button>

    <div class="dropdown-content">
      <a href="basic-calculator.html">Basic Calculator</a>
      <a href="bmi-calculator.html">BMI Calculator</a>
      <a href="age-calculator.html">Age Calculator</a>
      <a href="percentage-calculator.html">Percentage Calculator</a>
      <a href="loan-calculator.html">Loan Calculator</a>
      <a href="discount-calculator.html">Discount Calculator</a>
    </div>
  </div>

  <a href="about.html">About</a>

</nav>

<button id="menuIcon" onclick="toggleMenu()">☰</button>

<div class="calculator">
  <h1>Discount Calculator</h1>
  <p class="subtitle">Calculate final price after discount.</p>

  <input type="number" id="price" placeholder="Original price">
  <br><br>

  <input type="number" id="discount" placeholder="Discount %">
  <br><br>

  <button onclick="calculateDiscount()">discount</button>

  <h2 id="result"></h2>
</div>

<script>
function calculateDiscount(){
  let price = document.getElementById("price").value;
  let discount = document.getElementById("discount").value;

  let savings = price * discount / 100;
  let finalPrice = price - savings;

  document.getElementById("result").innerText =
  "Final price: " + finalPrice.toFixed(2) + " | You save: " + savings.toFixed(2);
}
</script>

</body>
</html>
