  <meta name="description" content="Free discount calculator to calculate sale price and savings online.">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body>

    MENU
  </button>

  <!-- Navbar -->

    <a href="index.html">home</a>

    <div class="dropdown">
      <button type="button" class="dropbtn">
        calculator
      </button>

      <div class="dropdown-content">

        <a href="basic-calculator.html">basic</a>

        <details class="nav-group">
          <summary>health</summary>

          <div class="nav-group-links">
            <a href="age-calculator.html">age</a>
            <a href="bmi-calculator.html">bmi</a>
          </div>
        </details>

        <details class="nav-group">
          <summary>finance</summary>

          <div class="nav-group-links">
            <a href="loan-calculator.html">loan</a>

      </div>
    </div>

  </nav>

  <!-- Main Content -->
  <main class="discount-calculator-container">

    <section class="discount-history-box">

      <div class="discount-history-top">
        <h3>Result</h3>

        <button type="button" onclick="clearDiscountHistory()" class="clear-btn">
          Clear
        </button>
      </div>

      <ul id="discountHistoryList"></ul>

    </section>

    <section class="calculator">

      <h1>Discount Calculator</h1>

      <p class="subtitle">
        Calculate final price after discount.
      </p>

      <label for="price">Original price:</label>
      <input type="number" id="price" placeholder="Example: 100">

      <label for="discount">Discount percentage:</label>
      <input type="number" id="discount" placeholder="Example: 20">

      <button type="button" onclick="calculateDiscount()" class="main-btn">
        calculate discount
      </button>

      <h2 id="result"></h2>

    </section>

  </main>

  <script src="script.js"></script>

  <script>
    let discountHistory = [];

    try {
      discountHistory = JSON.parse(localStorage.getItem("discountHistory")) || [];
    } catch {
      discountHistory = [];
    }

    function calculateDiscount() {
      const price = Number(document.getElementById("price").value);
      const discount = Number(document.getElementById("discount").value);
      const result = document.getElementById("result");

      if (price <= 0) {
        result.innerText = "Please enter a valid original price.";
        return;
      }

      if (discount < 0 || discount > 100) {
        result.innerText = "Please enter a discount between 0 and 100.";
        return;
      }

      const savings = price * discount / 100;
      const finalPrice = price - savings;

      const answer =
        "Original price: " + price.toFixed(2) + "\n" +
        "Discount: " + discount + "%\n" +
        "Final price: " + finalPrice.toFixed(2) + "\n" +
        "You save: " + savings.toFixed(2);

      result.innerText = answer;

      saveDiscountHistory(answer);
    }

    function saveDiscountHistory(answer) {
      const item = answer.replace(/\n/g, " | ");

      discountHistory.push(item);

      if (discountHistory.length > 50) {
        discountHistory.shift();
      }

      localStorage.setItem("discountHistory", JSON.stringify(discountHistory));

      showDiscountHistory();
    }

    function showDiscountHistory() {
      const list = document.getElementById("discountHistoryList");

      if (!list) return;

      list.innerHTML = "";

      discountHistory.slice().reverse().forEach(function (item) {
        const li = document.createElement("li");
        li.className = "history-item";

        const text = document.createElement("span");
        text.className = "history-text";
        text.textContent = item;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "history-copy-btn";
        copyBtn.textContent = "copy";

        copyBtn.onclick = function () {
          copyDiscountText(item, copyBtn);
        };

        li.appendChild(text);
        li.appendChild(copyBtn);

        list.appendChild(li);
      });
    }

    function copyDiscountText(text, button) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(function () {
            showDiscountCopied(button);
          })
          .catch(function () {
            fallbackDiscountCopy(text, button);
          });
      } else {
        fallbackDiscountCopy(text, button);
      }
    }

    function fallbackDiscountCopy(text, button) {
      const tempInput = document.createElement("textarea");

      tempInput.value = text;
      tempInput.style.position = "fixed";
      tempInput.style.left = "-9999px";
      tempInput.style.top = "-9999px";

      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand("copy");
        showDiscountCopied(button);
      } catch {
        button.textContent = "failed";

        setTimeout(function () {
          button.textContent = "copy";
        }, 1000);
      }

      document.body.removeChild(tempInput);
    }

    function showDiscountCopied(button) {
      button.textContent = "copied";

      setTimeout(function () {
        button.textContent = "copy";
      }, 1000);
    }

    function clearDiscountHistory() {
      discountHistory = [];
      localStorage.removeItem("discountHistory");

      showDiscountHistory();

      const result = document.getElementById("result");
      if (result) result.innerText = "";
    }

    document.addEventListener("DOMContentLoaded", showDiscountHistory);
  </script>

</body>
</html>
